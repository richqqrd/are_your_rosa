<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Identity Verification</title>
  <style>
    body {
      background-color: black;
      color: #ff4fd8;
      font-family: monospace;
      text-align: center;
      margin-top: 100px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      background: black;
      color: #ff4fd8;
      border: 1px solid #ff4fd8;
      cursor: pointer;
    }
    button:hover {
      background: #ff4fd8;
      color: black;
    }
  </style>
</head>
<body>

<h2 id="question">Initializing verification...</h2>
<div id="buttons"></div>

<script>
const questions = [
  "Are you Rosa?",
  "Are you NOT Rosa?",
  "Do you identify as Rosa?",
  "Are you pretending to be Rosa?",
  "Would Rosa say yes?",
  "Would Rosa say no?",
  "Are you the intended recipient?",
  "Are you absolutely sure?",
  "Are you uncertain?",
  "Would you lie about being Rosa?",
  "Is your name Rosa?",
  "Is your name not Rosa?",
  "Are you aware of this verification?",
  "Do you confirm your identity?",
  "Final question: Are you truly Rosa?"
];

const answers = [
  true,
  false,
  true,
  false,
  true,
  false,
  true,
  true,
  false,
  false,
  true,
  false,
  true,
  true,
  true
];

let current = 0;

function showQuestion() {
  if (current < questions.length) {
    document.getElementById("question").innerText = questions[current];

    document.getElementById("buttons").innerHTML = `
      <button onclick="answer(true)">YES</button>
      <button onclick="answer(false)">NO</button>
    `;
  } else {
    success();
  }
}

function answer(userAnswer) {
  if (userAnswer !== answers[current]) {
    fail();
    return;
  }

  current++;
  showQuestion();
}

function fail() {
  document.getElementById("question").innerText = "ACCESS DENIED";
  document.getElementById("buttons").innerHTML = "";
}

function success() {
  document.getElementById("question").innerText = "Verification complete.";
  document.getElementById("buttons").innerHTML = "<h3>CODEWORD: I AM ROSA</h3>";
}

showQuestion();
</script>

</body>
</html>
